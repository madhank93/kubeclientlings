[[exercises]]
name = "setup1"
path = "exercises/setup/setup1/main.go"
mode = "compile"
hint = """
kubectl finds credentials with the *standard loading rules*, not a fixed path.
In clientcmd that is:

    rules := clientcmd.NewDefaultClientConfigLoadingRules()
    overrides := &clientcmd.ConfigOverrides{CurrentContext: "kind-kubeclientlings"}
    config, err := clientcmd.NewNonInteractiveDeferredLoadingClientConfig(rules, overrides).ClientConfig()

The rules check $KUBECONFIG first, then fall back to ~/.kube/config — and the
override pins the context so it works no matter what your current context is."""

[[exercises]]
name = "setup2"
path = "exercises/setup/setup2/main.go"
mode = "compile"
hint = """
Look closely at the kubernetes.NewForConfig line. Two things are wrong:

1. It receives a brand-new empty &rest.Config{} instead of the `config` that
   was carefully loaded a few lines above. An empty config points at nothing.
2. The returned error is discarded with `_`. client-go constructors return
   errors for a reason — handle it and exit like the other calls do.
"""

[[exercises]]
name = "setup3"
path = "exercises/setup/setup3/main.go"
mode = "compile"
hint = """
Everything the checks want is a plain field on *rest.Config — set them right
after MustRESTConfig():

    config.QPS = 50
    config.Burst = 100
    config.Timeout = 10 * time.Second
    config.UserAgent = "kubeclientlings/setup3"

QPS/Burst are the client-side rate limiter (defaults 5/10 are painfully low
for controllers), Timeout bounds every request, and UserAgent is how your
client shows up in API server audit logs. Remember to import "time"."""

[[exercises]]
name = "pods1"
path = "exercises/pods/pods1/main.go"
mode = "compile"
hint = """
Namespaced clients take the namespace as an argument: Pods(ns), not Pods("").
The empty string means "no namespace" in the request URL — the API server
rejects a namespaced create without one. The `ns` variable from exkit.Begin
is the namespace this exercise should use."""

[[exercises]]
name = "pods2"
path = "exercises/pods/pods2/main.go"
mode = "compile"
hint = """
Filtering happens server-side via ListOptions:

    cs.CoreV1().Pods(ns).List(ctx, metav1.ListOptions{LabelSelector: "app=web"})

Same syntax as `kubectl get pods -l app=web`."""

[[exercises]]
name = "pods3"
path = "exercises/pods/pods3/main.go"
mode = "compile"
hint = """
Update() needs the object the server currently has — including its
resourceVersion — with your change applied on top:

    current, err := cs.CoreV1().Pods(ns).Get(ctx, "hello", metav1.GetOptions{})
    // handle err
    current.Labels["tier"] = "frontend"
    _, err = cs.CoreV1().Pods(ns).Update(ctx, current, metav1.UpdateOptions{})

A hand-built object has no resourceVersion (and an empty spec!), so the
server refuses it. And because the kubelet writes pod status between your
Get and Update, wrap the whole cycle in retry.RetryOnConflict
(k8s.io/client-go/util/retry):

    retry.RetryOnConflict(retry.DefaultRetry, func() error {
        // Get, mutate, Update — return the Update error
    })"""

[[exercises]]
name = "pods4"
path = "exercises/pods/pods4/main.go"
mode = "compile"
hint = """
The patch body {"metadata":{"labels":{...}}} is shaped like the object —
that's a strategic merge patch, so the type must say so:

    types.StrategicMergePatchType

types.JSONPatchType expects a completely different format:
[{"op":"add","path":"/metadata/labels/tier","value":"frontend"}]. Either
make the type match the body, or the body match the type."""

[[exercises]]
name = "pods5"
path = "exercises/pods/pods5/main.go"
mode = "compile"
hint = """
Inside the wait loop, check for the "gone" signal BEFORE treating err as
fatal:

    _, err := cs.CoreV1().Pods(ns).Get(ctx, "doomed", metav1.GetOptions{})
    if apierrors.IsNotFound(err) {
        return true, nil // deleted — success!
    }
    if err != nil {
        return false, err // real error
    }
    return false, nil

Import k8s.io/apimachinery/pkg/api/errors as apierrors."""

[[exercises]]
name = "deploy1"
path = "exercises/deployments/deploy1/main.go"
mode = "compile"
hint = """
Read the 422 the server sends back — it names the exact field. The
selector says app=web but the pod template's labels say app=website.
Make them identical (both app=web); the cleanest fix is one shared
`labels` variable used in both places."""

[[exercises]]
name = "deploy2"
path = "exercises/deployments/deploy2/main.go"
mode = "compile"
hint = """
.spec.replicas is a *int32. `replicas := 3` gives you an int, and Go will
not auto-convert pointer targets. Declare the right type:

    replicas := int32(3)
    dep.Spec.Replicas = &replicas"""

[[exercises]]
name = "deploy3"
path = "exercises/deployments/deploy3/main.go"
mode = "compile"
hint = """
containers is a list with merge key "name". The patch must say WHICH
container gets the new image:

    {"spec":{"template":{"spec":{"containers":[{"name":"web","image":"..."}]}}}}

Without "name" the server can't merge the list element and rejects the
patch."""

[[exercises]]
name = "deploy4"
path = "exercises/deployments/deploy4/main.go"
mode = "compile"
timeout = 240
hint = """
Status.Replicas counts created pods, not ready ones. Wait for the fields
that mean "done":

    if d.Status.ObservedGeneration < d.Generation { return false, nil }
    return d.Status.UpdatedReplicas == replicas &&
           d.Status.ReadyReplicas == replicas, nil

The ObservedGeneration guard matters after updates: without it you can read
a status describing the PREVIOUS spec and declare victory early."""

[[exercises]]
name = "svc1"
path = "exercises/services/svc1/main.go"
mode = "compile"
timeout = 240
hint = """
The deployment's pods carry app=web (exkit.NginxDeployment labels pods
app=<name>). The service selector says app=webserver — nothing matches.
Change the selector to {"app": "web"}."""

[[exercises]]
name = "svc2"
path = "exercises/services/svc2/main.go"
mode = "compile"
timeout = 240
hint = """
EndpointSlices carry the well-known label kubernetes.io/service-name.
Use the constant instead of guessing:

    import discoveryv1 "k8s.io/api/discovery/v1"
    LabelSelector: discoveryv1.LabelServiceName + "=web"

A selector on a label nothing has isn't an error — just an eternally empty
list, which is why the broken version times out instead of failing fast."""

[[exercises]]
name = "opt1"
path = "exercises/options/opt1/main.go"
mode = "compile"
hint = """
labels.Set is a map and SelectorFromSet ANDs every entry together. The
broken set only pins env=prod, so db-prod-1 rides along (3 pods, not 2).
Require both keys:

    labels.SelectorFromSet(labels.Set{"env": "prod", "tier": "web"})"""

[[exercises]]
name = "opt2"
path = "exercises/options/opt2/main.go"
mode = "compile"
hint = """
metadata.name is an object FIELD, not a label — a LabelSelector for it
matches nothing (and matching nothing is not an error, just an empty list).
Use the field selector instead:

    FieldSelector: "metadata.name=web-2"

Remember: field selectors only work on the handful of fields the server
indexes (metadata.name, metadata.namespace, status.phase, spec.nodeName...)."""

[[exercises]]
name = "opt3"
path = "exercises/options/opt3/main.go"
mode = "compile"
hint = """
Server-side apply requires an identity: every applied field records who owns
it. Empty ApplyOptions has no FieldManager, so the server rejects the patch.
Give it the name the assertion expects:

    metav1.ApplyOptions{FieldManager: "kubeclientlings"}"""

[[exercises]]
name = "opt4"
path = "exercises/options/opt4/main.go"
mode = "compile"
hint = """
An ownerReference without a UID is invalid — names can be reused, UIDs are
the server-assigned identity that never is. The Create() call for the owner
returned the object WITH its UID filled in:

    UID: owner.UID

Add that to the OwnerReference and garbage collection can do its job."""

[[exercises]]
name = "watch1"
path = "exercises/watch/watch1/main.go"
mode = "compile"
hint = """
watch.EventType is a string type, so `case "DELETE":` compiles — but the
server never sends that value. The real constants live in
k8s.io/apimachinery/pkg/watch:

    case watch.Deleted:
        sawDeleted = true

They stringify as ADDED, MODIFIED, DELETED — use the constants and you
never have to remember that."""

[[exercises]]
name = "watch2"
path = "exercises/watch/watch2/main.go"
mode = "compile"
hint = """
ResourceVersion "0" replays the server's cache: old-1/old-2/old-3 arrive as
fresh Added events before new-pod ever shows up. List-then-watch fixes it —
keep the list result and start the watch exactly where the list ended:

    list, err := cs.CoreV1().Pods(ns).List(ctx, metav1.ListOptions{})
    ...
    watcher, err := cs.CoreV1().Pods(ns).Watch(ctx, metav1.ListOptions{
        ResourceVersion: list.ResourceVersion,
    })"""

[[exercises]]
name = "watch3"
path = "exercises/watch/watch3/main.go"
mode = "compile"
hint = """
RetryWatcher rejects "" and "0" on purpose: it can only resume from a REAL
point in history. List first and hand it the list's resourceVersion:

    list, err := cs.CoreV1().Pods(ns).List(ctx, metav1.ListOptions{})
    ...
    watchtools.NewRetryWatcherWithContext(ctx, list.ResourceVersion, ...)"""

[[exercises]]
name = "watch4"
path = "exercises/watch/watch4/main.go"
mode = "compile"
hint = """
The broadcaster is never connected to the API server, so the recorder emits
into the void — no error, no event. Wire the sink before recording, with the
import typedcorev1 "k8s.io/client-go/kubernetes/typed/core/v1":

    broadcaster.StartRecordingToSink(&typedcorev1.EventSinkImpl{
        Interface: cs.CoreV1().Events(ns),
    })"""

[[exercises]]
name = "inf1"
path = "exercises/informers/inf1/main.go"
mode = "compile"
hint = """
Start() launches the initial List on a background goroutine and returns
immediately. Block until the cache is populated before reading it:

    import "k8s.io/client-go/tools/cache"

    if !cache.WaitForCacheSync(ctx.Done(), podInformer.Informer().HasSynced) {
        exkit.Failf("cache never synced")
    }

Every controller does exactly this between Start and serving."""

[[exercises]]
name = "inf2"
path = "exercises/informers/inf2/main.go"
mode = "compile"
hint = """
AddEventHandler only registers the callback — nothing runs until the
factory starts the informer goroutines. After registering (and before
creating the pod):

    factory.Start(ctx.Done())
    if !cache.WaitForCacheSync(ctx.Done(), podInformer.Informer().HasSynced) {
        exkit.Failf("cache never synced")
    }"""

[[exercises]]
name = "inf3"
path = "exercises/informers/inf3/main.go"
mode = "compile"
hint = """
Stores index namespaced objects by "namespace/name", not bare name. Either
build the key by hand:

    key := ns + "/target"

or — better — use the same helper controllers use, with the created pod:

    key, err := cache.MetaNamespaceKeyFunc(created)

(You'll need to keep the pod returned by Create for that.)"""

[[exercises]]
name = "inf4"
path = "exercises/informers/inf4/main.go"
mode = "compile"
timeout = 240
hint = """
NewSharedInformerFactory(cs, 0) watches pods in EVERY namespace — the cache
picks up kube-system and anything else running, so the count is wrong (and
the cache is way bigger than needed). Scope it:

    factory := informers.NewSharedInformerFactoryWithOptions(cs, 0,
        informers.WithNamespace(ns))"""

[[exercises]]
name = "dyn1"
path = "exercises/dynamic/dyn1/main.go"
mode = "compile"
hint = """
The dynamic client builds request URLs from the GVR's Resource field, and
that is the lowercase PLURAL ("pods"), never the Kind ("Pod"). The server
has no /api/v1/namespaces/<ns>/Pod endpoint:

    gvr := schema.GroupVersionResource{Group: "", Version: "v1", Resource: "pods"}

Group is empty for core/v1 resources — they live under /api, not /apis."""

[[exercises]]
name = "dyn2"
path = "exercises/dynamic/dyn2/main.go"
mode = "compile"
hint = """
Nested helpers need EVERY key on the path, top to bottom. A ConfigMap's
values live under .data, so "message" alone finds nothing:

    msg, found, err := unstructured.NestedString(u.Object, "data", "message")

found=false means the path is wrong (or empty), not that an error occurred."""

[[exercises]]
name = "dyn3"
path = "exercises/dynamic/dyn3/main.go"
mode = "compile"
timeout = 240
hint = """
The GVR version must match a version the CRD actually serves. This CRD's
spec.versions has exactly one: v1alpha1 (served=true). "v1" 404s as if the
resource never existed. Fix both the GVR and the object's apiVersion:

    gvr := schema.GroupVersionResource{Group: "kubeclientlings.dev", Version: "v1alpha1", Resource: "widgets"}
    // ... "apiVersion": "kubeclientlings.dev/v1alpha1""""

[[exercises]]
name = "dyn4"
path = "exercises/dynamic/dyn4/main.go"
mode = "compile"
hint = """
apps/v1beta1 was removed in Kubernetes 1.16 — discovery returns an error,
not an empty list. Deployments live in apps/v1 today:

    resources, err := disco.ServerResourcesForGroupVersion("apps/v1")

Never hardcode a dead groupVersion; discovery is how clients find live ones."""

[[exercises]]
name = "ctrl1"
path = "exercises/controllers/ctrl1/main.go"
mode = "compile"
hint = """
Get marks the item PROCESSING and the queue holds any re-Add back until you
release it. Without Done the re-added key never comes back and the third Get
blocks forever. Call Done once you finish the item:

    got = append(got, item)
    if i == 0 {
        q.Add(item)
    }
    q.Done(item)"""

[[exercises]]
name = "ctrl2"
path = "exercises/controllers/ctrl2/main.go"
mode = "compile"
hint = """
A bare pod.Name is not a cache key — SplitMetaNamespaceKey then yields an
empty namespace and the patch goes nowhere. Build a real "namespace/name"
key with the helper controllers use:

    key, err := cache.MetaNamespaceKeyFunc(pod)
    if err != nil {
        return
    }
    q.Add(key)"""

[[exercises]]
name = "ctrl3"
path = "exercises/controllers/ctrl3/main.go"
mode = "compile"
hint = """
The library enforces LeaseDuration > RenewDeadline > RetryPeriod. Here
LeaseDuration (5s) is shorter than RenewDeadline (10s), so NewLeaderElector
rejects it. Make the lease outlive the renew attempts:

    LeaseDuration:   15 * time.Second,
    RenewDeadline:   10 * time.Second,
    RetryPeriod:     2 * time.Second,"""

[[exercises]]
name = "op1"
path = "exercises/operator/op1/main.go"
mode = "compile"
hint = """
Two fixes, one lesson — the Reconcile contract:

1. The request already carries the full key. Fetch with it:

       if err := r.Get(ctx, req.NamespacedName, &cm); err != nil {

2. NotFound is not a failure — the object was deleted and the work is
   simply gone. Swallow it and report success:

       if apierrors.IsNotFound(err) {
           return ctrl.Result{}, nil
       }
       r.errs.Add(1)
       return ctrl.Result{}, err"""

[[exercises]]
name = "wq1"
path = "exercises/workqueue/wq1/main.go"
mode = "compile"
hint = """
Done releases an item from processing; it does nothing to the retry history,
so NumRequeues stays at 3. Forget is what clears backoff — a successful
reconcile calls it:

    q.Forget("a")"""

[[exercises]]
name = "wq2"
path = "exercises/workqueue/wq2/main.go"
mode = "compile"
hint = """
The fast-slow limiter returns a flat delay, not a growing one. For delays
that double every failure (base, 2·base, 4·base…) use the exponential
limiter:

    rl := workqueue.NewTypedItemExponentialFailureRateLimiter[string](base, max)"""

[[exercises]]
name = "wq3"
path = "exercises/workqueue/wq3/main.go"
mode = "compile"
hint = """
An unconditional AddRateLimited requeues a poison item forever. Cap the
retries and Forget past the cap:

    handleErr := func(key string) {
        if q.NumRequeues(key) < maxRetries {
            q.AddRateLimited(key)
            return
        }
        q.Forget(key)
    }"""

[[exercises]]
name = "test1"
path = "exercises/testing/test1/main.go"
mode = "compile"
hint = """
The fake tracker keys objects by namespace AND name. The pod was seeded in
"demo", so get it from "demo", not "default":

    got, err := cs.CoreV1().Pods("demo").Get(ctx, "seeded", metav1.GetOptions{})"""

[[exercises]]
name = "test2"
path = "exercises/testing/test2/main.go"
mode = "compile"
hint = """
A reactor only fires when its verb matches the call. The call is a Create,
so register the reactor for "create", not "update":

    cs.PrependReactor("create", "pods", func(action k8stesting.Action) (bool, runtime.Object, error) {
        return true, nil, apierrors.NewInternalError(fmt.Errorf("etcd unavailable"))
    })"""

[[exercises]]
name = "test3"
path = "exercises/testing/test3/main.go"
mode = "compile"
hint = """
Matches(verb, resource) must name the verb you actually called. The action
was a Create, so:

    actions[0].Matches("create", "configmaps")"""

[[exercises]]
name = "crd1"
path = "exercises/crds/crd1/main.go"
mode = "compile"
hint = """
The converter maps fields by their json tag. The unstructured object has a
"size" key, so the struct tag must be "size", not "sizes":

    Size int64 `json:"size"`"""

[[exercises]]
name = "crd2"
path = "exercises/crds/crd2/main.go"
mode = "compile"
hint = """
The dynamic client routes on apiVersion + kind, which come from TypeMeta.
Set it on the struct so the converted object carries them:

    w := Widget{
        TypeMeta: metav1.TypeMeta{APIVersion: "kubeclientlings.dev/v1alpha1", Kind: "Widget"},
        ...
    }"""

[[exercises]]
name = "ssa1"
path = "exercises/ssa/ssa1/main.go"
mode = "compile"
hint = """
An apply must name a field manager — the apiserver records ownership under
that name. Set it in ApplyOptions:

    cs.CoreV1().ConfigMaps(ns).Apply(ctx, apply, metav1.ApplyOptions{FieldManager: "kubeclientlings"})"""

[[exercises]]
name = "ssa2"
path = "exercises/ssa/ssa2/main.go"
mode = "compile"
hint = """
mgr-a owns data.owner, so mgr-b applying the same field conflicts. Force is
how you knowingly take ownership:

    metav1.ApplyOptions{FieldManager: "mgr-b", Force: true}"""

[[exercises]]
name = "sub1"
path = "exercises/subresources/sub1/main.go"
mode = "compile"
hint = """
Scale.Spec.Replicas is the desired count the /scale endpoint honors;
Status.Replicas is observed and read-only on write. Set the spec field:

    scale.Spec.Replicas = 3"""

[[exercises]]
name = "sub2"
path = "exercises/subresources/sub2/main.go"
mode = "compile"
timeout = 240
hint = """
With the status subresource enabled, the main Update endpoint ignores status
changes. Write status through the /status subresource:

    dyn.Resource(gvr).Namespace(ns).UpdateStatus(ctx, got, metav1.UpdateOptions{})"""

[[exercises]]
name = "fin1"
path = "exercises/finalizers/fin1/main.go"
mode = "compile"
hint = """
A finalizer makes Delete only mark the object terminating instead of removing
it. Add one to the object's ObjectMeta.Finalizers:

    Finalizers: []string{finalizer},"""

[[exercises]]
name = "fin2"
path = "exercises/finalizers/fin2/main.go"
mode = "compile"
hint = """
The object stays terminating until its finalizer list is empty. Clear the
slice before Update:

    got.Finalizers = nil
    cs.CoreV1().ConfigMaps(ns).Update(ctx, got, metav1.UpdateOptions{})"""

[[exercises]]
name = "wh1"
path = "exercises/webhooks/wh1/main.go"
mode = "compile"
hint = """
The handler must DENY when the team label is absent — the condition is
inverted. Use `!ok`:

    if _, ok := pod.Labels["team"]; !ok {
        resp.Allowed = false
        ...
    }"""

[[exercises]]
name = "wh2"
path = "exercises/webhooks/wh2/main.go"
mode = "compile"
hint = """
A JSON patch is silently ignored unless the response declares its type. Set
PatchType (it is a *PatchType, so take the address):

    pt := admissionv1.PatchTypeJSONPatch
    resp.PatchType = &pt"""
