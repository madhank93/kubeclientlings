[[exercises]]
name = "setup1"
path = "exercises/setup/setup1/main.go"
mode = "compile"
hint = """
kubectl finds credentials with the *standard loading rules*, not a fixed path.
In clientcmd that is:

    rules := clientcmd.NewDefaultClientConfigLoadingRules()
    overrides := &clientcmd.ConfigOverrides{CurrentContext: "kind-clientlings"}
    config, err := clientcmd.NewNonInteractiveDeferredLoadingClientConfig(rules, overrides).ClientConfig()

The rules check $KUBECONFIG first, then fall back to ~/.kube/config — and the
override pins the context so it works no matter what your current context is."""

[[exercises]]
name = "setup2"
path = "exercises/setup/setup2/main.go"
mode = "compile"
hint = """
Look closely at the kubernetes.NewForConfig line. Two things are wrong:

1. It receives a brand-new empty &rest.Config{} instead of the `config` that
   was carefully loaded a few lines above. An empty config points at nothing.
2. The returned error is discarded with `_`. client-go constructors return
   errors for a reason — handle it and exit like the other calls do.
"""

[[exercises]]
name = "setup3"
path = "exercises/setup/setup3/main.go"
mode = "compile"
hint = """
Everything the checks want is a plain field on *rest.Config — set them right
after MustRESTConfig():

    config.QPS = 50
    config.Burst = 100
    config.Timeout = 10 * time.Second
    config.UserAgent = "clientlings/setup3"

QPS/Burst are the client-side rate limiter (defaults 5/10 are painfully low
for controllers), Timeout bounds every request, and UserAgent is how your
client shows up in API server audit logs. Remember to import "time"."""

[[exercises]]
name = "pods1"
path = "exercises/pods/pods1/main.go"
mode = "compile"
hint = """
Namespaced clients take the namespace as an argument: Pods(ns), not Pods("").
The empty string means "no namespace" in the request URL — the API server
rejects a namespaced create without one. The `ns` variable from exkit.Begin
is the namespace this exercise should use."""

[[exercises]]
name = "pods2"
path = "exercises/pods/pods2/main.go"
mode = "compile"
hint = """
Filtering happens server-side via ListOptions:

    cs.CoreV1().Pods(ns).List(ctx, metav1.ListOptions{LabelSelector: "app=web"})

Same syntax as `kubectl get pods -l app=web`."""

[[exercises]]
name = "pods3"
path = "exercises/pods/pods3/main.go"
mode = "compile"
hint = """
Update() needs the object the server currently has — including its
resourceVersion — with your change applied on top:

    current, err := cs.CoreV1().Pods(ns).Get(ctx, "hello", metav1.GetOptions{})
    // handle err
    current.Labels["tier"] = "frontend"
    _, err = cs.CoreV1().Pods(ns).Update(ctx, current, metav1.UpdateOptions{})

A hand-built object has no resourceVersion (and an empty spec!), so the
server refuses it. And because the kubelet writes pod status between your
Get and Update, wrap the whole cycle in retry.RetryOnConflict
(k8s.io/client-go/util/retry):

    retry.RetryOnConflict(retry.DefaultRetry, func() error {
        // Get, mutate, Update — return the Update error
    })"""

[[exercises]]
name = "pods4"
path = "exercises/pods/pods4/main.go"
mode = "compile"
hint = """
The patch body {"metadata":{"labels":{...}}} is shaped like the object —
that's a strategic merge patch, so the type must say so:

    types.StrategicMergePatchType

types.JSONPatchType expects a completely different format:
[{"op":"add","path":"/metadata/labels/tier","value":"frontend"}]. Either
make the type match the body, or the body match the type."""

[[exercises]]
name = "pods5"
path = "exercises/pods/pods5/main.go"
mode = "compile"
hint = """
Inside the wait loop, check for the "gone" signal BEFORE treating err as
fatal:

    _, err := cs.CoreV1().Pods(ns).Get(ctx, "doomed", metav1.GetOptions{})
    if apierrors.IsNotFound(err) {
        return true, nil // deleted — success!
    }
    if err != nil {
        return false, err // real error
    }
    return false, nil

Import k8s.io/apimachinery/pkg/api/errors as apierrors."""

[[exercises]]
name = "deploy1"
path = "exercises/deployments/deploy1/main.go"
mode = "compile"
hint = """
Read the 422 the server sends back — it names the exact field. The
selector says app=web but the pod template's labels say app=website.
Make them identical (both app=web); the cleanest fix is one shared
`labels` variable used in both places."""

[[exercises]]
name = "deploy2"
path = "exercises/deployments/deploy2/main.go"
mode = "compile"
hint = """
.spec.replicas is a *int32. `replicas := 3` gives you an int, and Go will
not auto-convert pointer targets. Declare the right type:

    replicas := int32(3)
    dep.Spec.Replicas = &replicas"""

[[exercises]]
name = "deploy3"
path = "exercises/deployments/deploy3/main.go"
mode = "compile"
hint = """
containers is a list with merge key "name". The patch must say WHICH
container gets the new image:

    {"spec":{"template":{"spec":{"containers":[{"name":"web","image":"..."}]}}}}

Without "name" the server can't merge the list element and rejects the
patch."""

[[exercises]]
name = "deploy4"
path = "exercises/deployments/deploy4/main.go"
mode = "compile"
timeout = 240
hint = """
Status.Replicas counts created pods, not ready ones. Wait for the fields
that mean "done":

    if d.Status.ObservedGeneration < d.Generation { return false, nil }
    return d.Status.UpdatedReplicas == replicas &&
           d.Status.ReadyReplicas == replicas, nil

The ObservedGeneration guard matters after updates: without it you can read
a status describing the PREVIOUS spec and declare victory early."""

[[exercises]]
name = "svc1"
path = "exercises/services/svc1/main.go"
mode = "compile"
timeout = 240
hint = """
The deployment's pods carry app=web (exkit.NginxDeployment labels pods
app=<name>). The service selector says app=webserver — nothing matches.
Change the selector to {"app": "web"}."""

[[exercises]]
name = "svc2"
path = "exercises/services/svc2/main.go"
mode = "compile"
timeout = 240
hint = """
EndpointSlices carry the well-known label kubernetes.io/service-name.
Use the constant instead of guessing:

    import discoveryv1 "k8s.io/api/discovery/v1"
    LabelSelector: discoveryv1.LabelServiceName + "=web"

A selector on a label nothing has isn't an error — just an eternally empty
list, which is why the broken version times out instead of failing fast."""

[[exercises]]
name = "opt1"
path = "exercises/options/opt1/main.go"
mode = "compile"
hint = """
labels.Set is a map and SelectorFromSet ANDs every entry together. The
broken set only pins env=prod, so db-prod-1 rides along (3 pods, not 2).
Require both keys:

    labels.SelectorFromSet(labels.Set{"env": "prod", "tier": "web"})"""

[[exercises]]
name = "opt2"
path = "exercises/options/opt2/main.go"
mode = "compile"
hint = """
metadata.name is an object FIELD, not a label — a LabelSelector for it
matches nothing (and matching nothing is not an error, just an empty list).
Use the field selector instead:

    FieldSelector: "metadata.name=web-2"

Remember: field selectors only work on the handful of fields the server
indexes (metadata.name, metadata.namespace, status.phase, spec.nodeName...)."""

[[exercises]]
name = "opt3"
path = "exercises/options/opt3/main.go"
mode = "compile"
hint = """
Server-side apply requires an identity: every applied field records who owns
it. Empty ApplyOptions has no FieldManager, so the server rejects the patch.
Give it the name the assertion expects:

    metav1.ApplyOptions{FieldManager: "clientlings"}"""

[[exercises]]
name = "opt4"
path = "exercises/options/opt4/main.go"
mode = "compile"
hint = """
An ownerReference without a UID is invalid — names can be reused, UIDs are
the server-assigned identity that never is. The Create() call for the owner
returned the object WITH its UID filled in:

    UID: owner.UID

Add that to the OwnerReference and garbage collection can do its job."""

[[exercises]]
name = "watch1"
path = "exercises/watch/watch1/main.go"
mode = "compile"
hint = """
watch.EventType is a string type, so `case "DELETE":` compiles — but the
server never sends that value. The real constants live in
k8s.io/apimachinery/pkg/watch:

    case watch.Deleted:
        sawDeleted = true

They stringify as ADDED, MODIFIED, DELETED — use the constants and you
never have to remember that."""

[[exercises]]
name = "watch2"
path = "exercises/watch/watch2/main.go"
mode = "compile"
hint = """
ResourceVersion "0" replays the server's cache: old-1/old-2/old-3 arrive as
fresh Added events before new-pod ever shows up. List-then-watch fixes it —
keep the list result and start the watch exactly where the list ended:

    list, err := cs.CoreV1().Pods(ns).List(ctx, metav1.ListOptions{})
    ...
    watcher, err := cs.CoreV1().Pods(ns).Watch(ctx, metav1.ListOptions{
        ResourceVersion: list.ResourceVersion,
    })"""

[[exercises]]
name = "watch3"
path = "exercises/watch/watch3/main.go"
mode = "compile"
hint = """
RetryWatcher rejects "" and "0" on purpose: it can only resume from a REAL
point in history. List first and hand it the list's resourceVersion:

    list, err := cs.CoreV1().Pods(ns).List(ctx, metav1.ListOptions{})
    ...
    watchtools.NewRetryWatcherWithContext(ctx, list.ResourceVersion, ...)"""

[[exercises]]
name = "watch4"
path = "exercises/watch/watch4/main.go"
mode = "compile"
hint = """
The broadcaster is never connected to the API server, so the recorder emits
into the void — no error, no event. Wire the sink before recording, with the
import typedcorev1 "k8s.io/client-go/kubernetes/typed/core/v1":

    broadcaster.StartRecordingToSink(&typedcorev1.EventSinkImpl{
        Interface: cs.CoreV1().Events(ns),
    })"""
