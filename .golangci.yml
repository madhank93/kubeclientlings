# golangci-lint config (v1.x schema). Run via `mise run lint`.
# Keeps idiomatic-Go pressure on while learning — clippy-style parity.

issues:
  # clientlings ships intentionally-broken exercises and runner test fixtures.
  exclude-dirs:
    - clientlings/fixtures
    - exercises
    - solutions

linters:
  enable:
    - errcheck      # unchecked errors
    - govet         # suspicious constructs
    - staticcheck   # broad correctness/idiom checks
    - ineffassign   # unused assignments
    - unused        # unused code
    - gofmt         # formatting
    - goimports     # import grouping/ordering
